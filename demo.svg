<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520" style="font-family:'Courier New',Courier,monospace;">
  <defs>
    <style>
      .term { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
      .cyan  { fill: #00d4d4; }
      .cyanb { fill: #00ffff; font-weight: bold; }
      .green { fill: #4dff91; font-weight: bold; }
      .yellow{ fill: #ffd966; font-weight: bold; }
      .grey  { fill: #6b7280; }
      .white { fill: #e2e8f0; }
      .red   { fill: #ff6b6b; font-weight: bold; }
      .dim   { fill: #4b5563; }
      .cursor{ fill: #00ffff; opacity: 0; }

      /* Panel labels */
      .label { font-size: 11px; fill: #6b7280; font-family: 'Courier New', monospace; }

      /* Blink cursor */
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .blink { animation: blink 1s step-end infinite; }

      /* Fade in groups at different times */
      .g0  { opacity:0; animation: fadeIn 0.3s 0.5s  forwards; }
      .g1  { opacity:0; animation: fadeIn 0.3s 1.2s  forwards; }
      .g2  { opacity:0; animation: fadeIn 0.3s 1.8s  forwards; }
      .g3  { opacity:0; animation: fadeIn 0.3s 2.4s  forwards; }
      .g4  { opacity:0; animation: fadeIn 0.3s 3.0s  forwards; }
      .g5  { opacity:0; animation: fadeIn 0.3s 3.6s  forwards; }
      .g6  { opacity:0; animation: fadeIn 0.3s 4.4s  forwards; }
      .g7  { opacity:0; animation: fadeIn 0.3s 5.0s  forwards; }
      .g8  { opacity:0; animation: fadeIn 0.3s 5.6s  forwards; }
      .g9  { opacity:0; animation: fadeIn 0.3s 6.2s  forwards; }
      .g10 { opacity:0; animation: fadeIn 0.3s 7.0s  forwards; }
      .g11 { opacity:0; animation: fadeIn 0.3s 7.6s  forwards; }
      .g12 { opacity:0; animation: fadeIn 0.3s 8.2s  forwards; }
      .g13 { opacity:0; animation: fadeIn 0.3s 8.8s  forwards; }
      .g14 { opacity:0; animation: fadeIn 0.3s 9.6s  forwards; }
      .g15 { opacity:0; animation: fadeIn 0.3s 10.2s forwards; }
      .g16 { opacity:0; animation: fadeIn 0.3s 10.8s forwards; }
      .g17 { opacity:0; animation: fadeIn 0.3s 11.4s forwards; }
      .g18 { opacity:0; animation: fadeIn 0.3s 12.2s forwards; }
      .g19 { opacity:0; animation: fadeIn 0.3s 12.8s forwards; }
      .g20 { opacity:0; animation: fadeIn 0.3s 13.4s forwards; }
      .g21 { opacity:0; animation: fadeIn 0.3s 14.0s forwards; }
      .g22 { opacity:0; animation: fadeIn 0.3s 14.8s forwards; }
      .g23 { opacity:0; animation: fadeIn 0.3s 15.4s forwards; }

      /* Cipher animation — flicker in then resolve */
      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes cipher {
        0%   { opacity:1; }
        60%  { opacity:1; }
        100% { opacity:0; }
      }
      @keyframes plain {
        0%   { opacity:0; }
        60%  { opacity:0; }
        100% { opacity:1; }
      }
      .cipher-text { animation: cipher 1.2s ease-out forwards; }
      .plain-text  { opacity:0; animation: plain  1.2s ease-out forwards; }

      .c1  { opacity:0; animation: fadeIn 0.3s 5.7s  forwards; }
      .c2  { opacity:0; animation: fadeIn 0.3s 8.3s  forwards; }
      .c3  { opacity:0; animation: fadeIn 0.3s 11.5s forwards; }

      /* typing indicator dots */
      @keyframes dot1 { 0%,66%,100%{opacity:0} 33%{opacity:1} }
      @keyframes dot2 { 0%,33%,100%{opacity:0} 66%{opacity:1} }
      @keyframes dot3 { 0%,33%,66%{opacity:0} 100%{opacity:1} }
    </style>

    <!-- Terminal window chrome gradient -->
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2436"/>
      <stop offset="100%" stop-color="#161b2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer frame -->
  <rect width="860" height="520" rx="12" fill="#0a0d14" stroke="#1e2d3d" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect width="860" height="36" rx="12" fill="url(#headerGrad)"/>
  <rect y="24" width="860" height="12" fill="url(#headerGrad)"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="430" y="23" text-anchor="middle" font-size="12" fill="#4b5563" font-family="'Courier New',monospace">NoEyes — Secure Terminal Chat</text>

  <!-- Split line -->
  <line x1="430" y1="36" x2="430" y2="520" stroke="#1e2d3d" stroke-width="1"/>

  <!-- Left panel label -->
  <text x="215" y="52" text-anchor="middle" class="label">alice@laptop</text>
  <!-- Right panel label -->
  <text x="645" y="52" text-anchor="middle" class="label">bob@desktop</text>

  <!-- ═══════════════ ALICE PANEL ═══════════════ -->
  <g transform="translate(10, 56)">

    <!-- Banner -->
    <g class="g0">
      <text x="8"  y="16" class="term cyan" font-size="11"> _   _       _____</text>
      <text x="8"  y="29" class="term cyan" font-size="11">| \ | | ___ | ____|_   _  ___  ___</text>
      <text x="8"  y="42" class="term cyan" font-size="11">|  \| |/ _ \|  _| | | | |/ _ \/ __|</text>
      <text x="8"  y="55" class="term cyan" font-size="11">| |\  | (_) | |___| |_| |  __/\__ \</text>
      <text x="8"  y="68" class="term cyan" font-size="11">|_| \_|\___/|_____|\__, |\___||___/</text>
      <text x="8"  y="81" class="term cyan" font-size="11">                   |___/</text>
      <text x="8"  y="97" class="term cyan" font-size="11">  Secure Terminal Chat  |  E2E Encrypted</text>
    </g>

    <!-- Room header -->
    <g class="g1">
      <text x="8" y="115" class="term cyanb" font-size="12">  ══  general  ══</text>
    </g>

    <!-- System: bob joined -->
    <g class="g2">
      <text x="8" y="133" class="term grey">[19:45:36]</text>
      <text x="88" y="133" class="term yellow"> [SYSTEM]</text>
      <text x="163" y="133" class="term white"> bob has joined the chat.</text>
    </g>

    <!-- [dh] key established -->
    <g class="g3">
      <text x="8" y="149" class="term grey">[dh]</text>
      <text x="40" y="149" class="term dim"> Pairwise key established with bob.</text>
    </g>

    <!-- Alice types -->
    <g class="g4">
      <text x="8" y="167" class="term grey">alice&gt;</text>
      <text x="58" y="167" class="term white"> hey bob!</text>
    </g>

    <!-- Alice sees own message -->
    <g class="g5">
      <text x="8" y="183" class="term grey">[19:45:39]</text>
      <text x="88" y="183" class="term yellow font-bold"> alice:</text>
      <text x="135" y="183" class="term white"> hey bob!</text>
    </g>

    <!-- Bob's reply arrives — cipher then plain -->
    <g class="g6">
      <text x="8" y="199" class="term grey">[19:45:41]</text>
      <text x="88" y="199" class="term green"> bob:</text>
      <!-- cipher layer -->
      <g class="c1">
        <text x="122" y="199" class="term cyan cipher-text" font-size="13">╠▓░⠿┬╗▄╪┐≈╚▒</text>
        <text x="122" y="199" class="term white plain-text"> is this E2E?</text>
      </g>
    </g>

    <!-- alice /msg reply -->
    <g class="g7">
      <text x="8" y="217" class="term grey">alice&gt;</text>
      <text x="58" y="217" class="term white"> /msg bob yes — server sees zero</text>
    </g>

    <!-- PM sent confirmation -->
    <g class="g8">
      <text x="8" y="233" class="term grey">[19:45:44]</text>
      <text x="88" y="233" class="term cyanb"> [PM → bob]</text>
      <text x="176" y="233" class="term green">✓</text>
      <text x="190" y="233" class="term white"> yes — server sees zero</text>
    </g>

    <!-- /join secret -->
    <g class="g9">
      <text x="8" y="251" class="term grey">alice&gt;</text>
      <text x="58" y="251" class="term white"> /join secret</text>
    </g>
    <g class="g10">
      <text x="8" y="267" class="term cyan">[join]</text>
      <text x="52" y="267" class="term dim"> Switched to room 'secret'.</text>
    </g>
    <g class="g11">
      <text x="8" y="283" class="term cyanb">  ══  secret  ══</text>
    </g>

    <!-- message in secret room -->
    <g class="g12">
      <text x="8" y="301" class="term grey">alice&gt;</text>
      <text x="58" y="301" class="term white"> only we can see this</text>
    </g>
    <g class="g13">
      <text x="8" y="317" class="term grey">[19:45:49]</text>
      <text x="88" y="317" class="term yellow"> alice:</text>
      <text x="135" y="317" class="term white"> only we can see this</text>
    </g>

    <!-- /leave -->
    <g class="g14">
      <text x="8" y="335" class="term grey">alice&gt;</text>
      <text x="58" y="335" class="term white"> /leave</text>
    </g>
    <g class="g15">
      <text x="8" y="351" class="term cyan">[leave]</text>
      <text x="60" y="351" class="term dim"> Returned to room 'general'.</text>
    </g>
    <g class="g16">
      <text x="8" y="367" class="term cyanb">  ══  general  ══</text>
    </g>

    <!-- back in general, bob's away msg animates -->
    <g class="g17">
      <text x="8" y="383" class="term grey">[19:45:39]</text>
      <text x="88" y="383" class="term yellow"> alice:</text>
      <text x="135" y="383" class="term dim"> hey bob!</text>
    </g>
    <g class="g18">
      <text x="8" y="399" class="term grey">[19:45:41]</text>
      <text x="88" y="399" class="term green"> bob:</text>
      <g class="c3">
        <text x="122" y="399" class="term cyan cipher-text" font-size="13">░▒▓╔╗┬╪≈▄</text>
        <text x="122" y="399" class="term white plain-text"> is this E2E?</text>
      </g>
    </g>
    <g class="g19">
      <text x="8" y="415" class="term grey">[19:45:52]</text>
      <text x="88" y="415" class="term green"> bob:</text>
      <g class="c3">
        <text x="122" y="415" class="term cyan cipher-text" font-size="13">╬░┐▒╚╠▓⠿╕</text>
        <text x="122" y="415" class="term white plain-text"> missed you in general!</text>
      </g>
    </g>

    <!-- cursor -->
    <g class="g20">
      <text x="8" y="433" class="term grey">alice&gt;</text>
      <rect x="58" y="421" width="8" height="14" class="cursor blink" fill="#00ffff"/>
    </g>

  </g>

  <!-- ═══════════════ BOB PANEL ═══════════════ -->
  <g transform="translate(440, 56)">

    <!-- Banner -->
    <g class="g0">
      <text x="8"  y="16" class="term cyan" font-size="11"> _   _       _____</text>
      <text x="8"  y="29" class="term cyan" font-size="11">| \ | | ___ | ____|_   _  ___  ___</text>
      <text x="8"  y="42" class="term cyan" font-size="11">|  \| |/ _ \|  _| | | | |/ _ \/ __|</text>
      <text x="8"  y="55" class="term cyan" font-size="11">| |\  | (_) | |___| |_| |  __/\__ \</text>
      <text x="8"  y="68" class="term cyan" font-size="11">|_| \_|\___/|_____|\__, |\___||___/</text>
      <text x="8"  y="81" class="term cyan" font-size="11">                   |___/</text>
      <text x="8"  y="97" class="term cyan" font-size="11">  Secure Terminal Chat  |  E2E Encrypted</text>
    </g>

    <g class="g1">
      <text x="8" y="115" class="term cyanb" font-size="12">  ══  general  ══</text>
    </g>

    <!-- alice's message arrives at bob — cipher then plain -->
    <g class="g4">
      <text x="8" y="149" class="term grey">[19:45:39]</text>
      <text x="88" y="149" class="term green"> alice:</text>
      <g class="c1">
        <text x="130" y="149" class="term cyan cipher-text" font-size="13">▒╠┐░╔╗≈▄▓╪</text>
        <text x="130" y="149" class="term white plain-text"> hey bob!</text>
      </g>
    </g>

    <!-- bob types reply -->
    <g class="g5">
      <text x="8" y="167" class="term grey">bob&gt;</text>
      <text x="42" y="167" class="term white"> is this E2E?</text>
    </g>
    <g class="g6">
      <text x="8" y="183" class="term grey">[19:45:41]</text>
      <text x="88" y="183" class="term yellow"> bob:</text>
      <text x="118" y="183" class="term white"> is this E2E?</text>
    </g>

    <!-- PM from alice arrives at bob -->
    <g class="g9">
      <text x="8" y="217" class="term grey">[19:45:44]</text>
      <text x="88" y="217" class="term cyanb"> [PM from alice]</text>
      <text x="202" y="217" class="term green">✓</text>
      <g class="c2">
        <text x="218" y="217" class="term cyan cipher-text" font-size="13">╬▄╪░╔▒┬╗≈▓╕</text>
        <text x="218" y="217" class="term white plain-text"> yes — server sees zero</text>
      </g>
    </g>

    <!-- system: alice switched rooms -->
    <g class="g10">
      <text x="8" y="235" class="term grey">[19:45:47]</text>
      <text x="88" y="235" class="term yellow"> [SYSTEM]</text>
      <text x="163" y="235" class="term white"> alice switched rooms.</text>
    </g>

    <!-- bob chats while alice is away -->
    <g class="g11">
      <text x="8" y="253" class="term grey">bob&gt;</text>
      <text x="42" y="253" class="term white"> missed you in general!</text>
    </g>
    <g class="g12">
      <text x="8" y="269" class="term grey">[19:45:52]</text>
      <text x="88" y="269" class="term yellow"> bob:</text>
      <text x="118" y="269" class="term white"> missed you in general!</text>
    </g>

    <!-- system: alice returned -->
    <g class="g16">
      <text x="8" y="303" class="term grey">[19:45:54]</text>
      <text x="88" y="303" class="term yellow"> [SYSTEM]</text>
      <text x="163" y="303" class="term white"> alice has joined the chat.</text>
    </g>

    <!-- Server box — bottom right -->
    <g class="g0">
      <rect x="8" y="340" width="400" height="100" rx="6" fill="#0d1117" stroke="#1e2d3d" stroke-width="1"/>
      <text x="20" y="357" class="term yellow" font-size="11">server console  (what the server sees)</text>
      <line x1="8" y1="362" x2="408" y2="362" stroke="#1e2d3d" stroke-width="1"/>
      <text x="20" y="378" class="term dim" font-size="11">[server] type=system  event=join    username=alice</text>
      <text x="20" y="393" class="term dim" font-size="11">[server] type=chat    room=general  from=alice  (payload: ██████████)</text>
      <text x="20" y="408" class="term dim" font-size="11">[server] type=privmsg to=bob        from=alice  (payload: ██████████)</text>
      <text x="20" y="423" class="term dim" font-size="11">[server] type=command event=join_room  room=secret</text>
      <text x="20" y="433" class="term red" font-size="10">  ↑ routing metadata only — message content always encrypted</text>
    </g>

    <!-- bob cursor -->
    <g class="g20">
      <text x="8" y="470" class="term grey">bob&gt;</text>
      <rect x="42" y="458" width="8" height="14" class="cursor blink" fill="#00ffff"/>
    </g>

  </g>

</svg>
